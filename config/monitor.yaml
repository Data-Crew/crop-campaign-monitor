# ── Region & Season ─────────────────────────────────
region:
  name: "central_iowa"
  fields_dir: "data/fields"
  tiles: ["16tgk"]
  fragments: "all"
  # Directory structure expected:
  #   data/fields/<tile_id>/<tile_id>_fragment_XX_YY.geojson
  # Use "all" to load every fragment, or list specific ones: ["00_00", "01_00"]

season:
  start_date: "2024-04-15"
  end_date: "2024-10-31"
  cadence_days: 16

# ── Data Sources ────────────────────────────────────
stac:
  catalog_url: "https://earth-search.aws.element84.com/v1"
  collection: "sentinel-2-l2a"
  max_cloud_cover: 20
  max_scenes: 20
  bands: ["B02", "B03", "B04", "B08", "B05", "B06", "B07", "B8A", "B11", "B12"]

cdl:
  source: "embedded"   # "embedded" = use labels from GeoJSON properties; "usda" = download CDL raster
  year: 2022            # only used when source: "usda"

# ── Chip Extraction ─────────────────────────────────
chips:
  size_px: 224
  resolution_m: 10
  padding_mode: "reflect"
  nodata_threshold: 0.3
  max_parcels: null  # controlled from dashboard; null = all parcels

# ── Model ───────────────────────────────────────────
model:
  backend: "clay-direct"
  weights_path: "data/model/clay-crop-encoder.ckpt"
  fallback_weights: "data/model/clay-v1-base.ckpt"
  embedding_dim: 768
  batch_size: 16
  num_workers: 4

# ── Scoring ─────────────────────────────────────────
scoring:
  method: "cosine_distance"
  aggregation: "temporal_mean"
  threshold_method: "adaptive"   # "fixed" = use absolute thresholds; "adaptive" = z-score based
  thresholds:                    # used when threshold_method: "fixed"
    green: 0.15
    yellow: 0.30
    red: 0.30
  sigma_yellow: 1.5              # used when threshold_method: "adaptive" (mean + N*std)
  sigma_red: 2.5
  min_observations: 1
  urgency_weight_early: 1.5

# ── GPU ─────────────────────────────────────────────
gpu:
  default_device: "RTX 4070"
  smoke_test_device: "RTX 500"

# ── Output ──────────────────────────────────────────
output:
  dir: "data/output"
  parquet: true
  geojson: true
  csv_summary: true
