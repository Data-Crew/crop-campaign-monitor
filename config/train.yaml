# ── Fine-tuning Clay with CDL supervision ───────────

base_model:
  backbone: "clay_v1_base"
  weights_path: "data/model/clay-v1-base.ckpt"
  # Clay band names matching the S2 band order in monitor.yaml
  bands: ["blue", "green", "red", "nir", "rededge1", "rededge2", "rededge3", "nir08", "swir16", "swir22"]

data:
  cdl_year: 2024
  cdl_source: "usda"
  fields_dir: "data/fields"
  tiles: ["16tgk"]
  fragments: "all"
  chips_dir: "data/chips"
  min_parcels_per_class: 500
  target_classes:
    - corn
    - soybeans
    - winter_wheat
    - spring_wheat
    - alfalfa
    - grassland
    - fallow
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  dataset_dir: "data/training"

training:
  task: "classification"
  num_classes: 7
  epochs: 30
  batch_size: 4
  lr: 1.0e-4
  freeze_backbone_epochs: 5
  unfreeze_backbone_lr: 1.0e-5
  augmentations:
    random_horizontal_flip: true
    random_vertical_flip: true
    band_dropout: 0.1
  early_stopping_patience: 5
  checkpoint_monitor: "val/loss"

output:
  checkpoint_dir: "data/model"
  finetuned_checkpoint: "data/model/clay-finetuned-crops.ckpt"
  encoder_checkpoint: "data/model/clay-crop-encoder.ckpt"
  training_logs: "data/training/logs"

gpu:
  device: "RTX 4070"
